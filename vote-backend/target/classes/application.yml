spring:
  application:
    name: vote-backend
  datasource:
    url: jdbc:mysql://localhost:3306/hall?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

server:
  port: 8081
  # 若 8081 已被占用，可改为 8082 或启动时加：--server.port=8082；或使用 dev 配置（默认 8082）

# JWT（小程序端）
jwt:
  secret: vote-backend-secret-key-change-in-production
  expiration-ms: 604800000

# 微信小程序（手机号登录需在此填写真实 AppID/Secret）
wechat:
  mini:
    app-id: ${WECHAT_MINI_APP_ID:}
    app-secret: ${WECHAT_MINI_APP_SECRET:}

# 日志
logging:
  level:
    root: INFO
    com.example.vote: DEBUG
