<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/head :: head}"></head>
<body>
<div th:replace="~{layout/header :: header}"></div>
<div class="container-fluid">
    <div class="row">
        <div th:replace="~{layout/sidebar :: sidebar}"></div>
        <main class="col-md-10 ms-sm-auto px-4 py-3">
            <h1 class="h2">举报/投诉详情</h1>
            <div class="card">
                <div class="card-body">
                    <p id="reportDetailError" class="text-danger small" style="display:none;"></p>
                    <div id="reportDetailBox" style="display:none;">
                        <p><strong>ID：</strong><span id="reportId"></span></p>
                        <p><strong>类型：</strong><span id="reportType"></span></p>
                        <p><strong>目标：</strong><span id="reportTarget"></span></p>
                        <p><strong>举报人ID：</strong><span id="reportReporterId"></span></p>
                        <p><strong>内容：</strong><span id="reportContent" class="border p-2 d-block"></span></p>
                        <p><strong>状态：</strong><span id="reportStatus"></span></p>
                        <p><strong>处理备注：</strong><span id="reportHandleRemark"></span></p>
                        <p><strong>创建时间：</strong><span id="reportCreateTime"></span></p>
                        <div id="reportHandleArea" class="mt-3">
                            <label class="form-label">处理备注（选填）</label>
                            <input type="text" class="form-control mb-2" id="reportHandleRemarkInput" placeholder="处理说明"/>
                            <button type="button" class="btn btn-success" id="btnReportHandle">标记为已处理</button>
                        </div>
                    </div>
                    <a href="/report/list" class="btn btn-secondary">返回列表</a>
                </div>
            </div>
        </main>
    </div>
</div>
<div th:replace="~{layout/footer :: footer}"></div>
<script th:src="@{/js/request.js}"></script>
<script th:src="@{/js/report-detail.js}"></script>
</body>
</html>
