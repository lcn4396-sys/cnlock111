<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/head :: head}"></head>
<body>
<div th:replace="~{layout/header :: header}"></div>
<div class="container-fluid">
    <div class="row">
        <div th:replace="~{layout/sidebar :: sidebar}"></div>
        <main class="col-md-10 ms-sm-auto px-4 py-3">
            <h1 class="h2">评论列表</h1>
            <p class="text-muted">投票评论，支持审核、删除。</p>
            <div class="card">
                <div class="card-body">
                    <p id="commentListError" class="text-danger small" style="display:none;"></p>
                    <table class="table table-hover">
                        <thead><tr><th>ID</th><th>投票ID</th><th>用户ID</th><th>内容</th><th>时间</th><th>状态</th><th>操作</th></tr></thead>
                        <tbody id="commentListBody"><tr><td colspan="7" class="text-center text-muted">加载中...</td></tr></tbody>
                    </table>
                    <nav id="commentListPager" class="mt-2" aria-label="分页" style="display:none;"></nav>
                </div>
            </div>
        </main>
    </div>
</div>
<div th:replace="~{layout/footer :: footer}"></div>
<script th:src="@{/js/request.js}"></script>
<script th:src="@{/js/comment-list.js}"></script>
</body>
</html>
