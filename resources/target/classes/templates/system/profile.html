<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/head :: head}"></head>
<body>
<div th:replace="~{layout/header :: header}"></div>
<div class="container-fluid">
    <div class="row">
        <div th:replace="~{layout/sidebar :: sidebar}"></div>
        <main class="col-md-10 ms-sm-auto px-4 py-3">
            <h1 class="h2">个人信息</h1>
            <p class="text-muted">管理员昵称、手机、邮箱、修改密码。</p>
            <div class="card">
                <div class="card-body">
                    <p id="profileError" class="text-danger small" style="display:none;"></p>
                    <form id="profileForm">
                        <div class="mb-3"><label class="form-label">用户名</label><input type="text" class="form-control" id="profileUsername" readonly/></div>
                        <div class="mb-3"><label class="form-label">昵称</label><input type="text" class="form-control" id="profileNickname" name="nickname"/></div>
                        <div class="mb-3"><label class="form-label">手机号</label><input type="text" class="form-control" id="profileMobile" name="mobile"/></div>
                        <div class="mb-3"><label class="form-label">邮箱</label><input type="email" class="form-control" id="profileEmail" name="email"/></div>
                        <button type="submit" class="btn btn-primary">保存</button>
                    </form>
                    <hr/>
                    <h6>修改密码</h6>
                    <form id="profilePwdForm">
                        <div class="mb-3"><label class="form-label">原密码</label><input type="password" class="form-control" id="profileOldPwd" required/></div>
                        <div class="mb-3"><label class="form-label">新密码</label><input type="password" class="form-control" id="profileNewPwd" required/></div>
                        <button type="submit" class="btn btn-warning">修改密码</button>
                    </form>
                </div>
            </div>
        </main>
    </div>
</div>
<div th:replace="~{layout/footer :: footer}"></div>
<script th:src="@{/js/request.js}"></script>
<script th:src="@{/js/profile.js}"></script>
</body>
</html>
