<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/head :: head}"></head>
<body>
<div th:replace="~{layout/header :: header}"></div>
<div class="container-fluid">
    <div class="row">
        <div th:replace="~{layout/sidebar :: sidebar}"></div>
        <main class="col-md-10 ms-sm-auto px-4 py-3">
            <h1 class="h2">投票详情</h1>
            <p class="text-muted">展示投票详细内容、候选项、参与情况统计。</p>
            <div class="card">
                <div class="card-body">
                    <p id="voteDetailError" class="text-danger small" style="display:none;"></p>
                    <div id="voteDetailBox" style="display:none;">
                        <p><strong>标题：</strong><span id="voteDetailTitle"></span></p>
                        <p><strong>描述：</strong><span id="voteDetailDesc"></span></p>
                        <p><strong>状态：</strong><span id="voteDetailStatus"></span></p>
                        <p><strong>参与人数：</strong><span id="voteDetailParticipantCount"></span></p>
                        <h6 class="mt-3">选项与得票</h6>
                        <table class="table table-sm"><thead><tr><th>选项</th><th>得票数</th></tr></thead><tbody id="voteDetailOptions"></tbody></table>
                        <a href="/vote/result?id=" id="voteDetailResultLink" class="btn btn-primary me-1">查看结果</a>
                        <a href="/vote/edit?id=" id="voteDetailEditLink" class="btn btn-outline-secondary">编辑</a>
                    </div>
                    <a href="/vote/list" class="btn btn-secondary">返回列表</a>
                </div>
            </div>
        </main>
    </div>
</div>
<div th:replace="~{layout/footer :: footer}"></div>
<script th:src="@{/js/request.js}"></script>
<script th:src="@{/js/vote-detail.js}"></script>
</body>
</html>
