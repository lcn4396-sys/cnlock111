<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/head :: head}"></head>
<body>
<div th:replace="~{layout/header :: header}"></div>
<div class="container-fluid">
    <div class="row">
        <div th:replace="~{layout/sidebar :: sidebar}"></div>
        <main class="col-md-10 ms-sm-auto px-4 py-3">
            <h1 class="h2">用户列表</h1>
            <p class="text-muted">小程序注册用户，支持搜索、禁用/启用。</p>
            <div class="card">
                <div class="card-body">
                    <p id="userListError" class="text-danger small" style="display:none;"></p>
                    <table class="table table-hover">
                        <thead><tr><th>ID</th><th>昵称</th><th>手机号</th><th>注册时间</th><th>状态</th><th>操作</th></tr></thead>
                        <tbody id="userListBody"><tr><td colspan="6" class="text-center text-muted">加载中...</td></tr></tbody>
                    </table>
                    <nav id="userListPager" class="mt-2" aria-label="分页" style="display:none;"></nav>
                </div>
            </div>
        </main>
    </div>
</div>
<div th:replace="~{layout/footer :: footer}"></div>
<script th:src="@{/js/request.js}"></script>
<script th:src="@{/js/user-list.js}"></script>
</body>
</html>
